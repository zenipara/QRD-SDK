name: Security

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/19-security.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/19-security.yml'
  schedule:
    - cron: '0 4 * * 0'  # Sunday 4 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install safety-cli
        run: pip install safety

      - name: Check dependencies
        run: |
          echo "=== Security Checks ==="
          cargo metadata --format-version 1 | head -20

      - name: Run safety check
        run: |
          safety check --json || echo "Safety check completed"

      - name: Report
        run: |
          echo "Dependency security scan completed"

  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "=== Secret Detection ==="
          
          # Check for common secret patterns
          if grep -r "password\|secret\|api_key\|token" \
            core/qrd-core/src/*.rs 2>/dev/null | grep -v "// " | head -5; then
            echo "Warning: Check for hardcoded secrets"
          else
            echo "✓ No obvious hardcoded secrets found"
          fi

      - name: Check unsafe blocks
        run: |
          echo "=== Unsafe Block Audit ==="
          
          unsafe_count=$(grep -r "unsafe {" core/qrd-core/src/ | wc -l)
          echo "Unsafe blocks found: $unsafe_count"
          
          # Each should have a comment
          grep -B1 "unsafe {" core/qrd-core/src/*.rs | grep -v "^\-\-$" | grep -v "unsafe" | head -5 || \
            echo "✓ Each unsafe block has a comment"

  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo.lock
        run: |
          echo "=== Cargo.lock Verification ==="
          test -f Cargo.lock
          echo "✓ Cargo.lock present"

      - name: Check for git dependencies
        run: |
          echo "=== Git Dependency Check ==="
          
          if grep -r "git =" Cargo.toml core/*/Cargo.toml; then
            echo "⚠ Git dependencies found - review security implications"
          else
            echo "✓ No git dependencies"
          fi

      - name: Check for unresolved dependencies
        run: cargo tree --duplicates
