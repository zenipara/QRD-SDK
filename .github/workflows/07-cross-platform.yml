name: CrossPlatform

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - '.github/workflows/07-cross-platform.yml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - '.github/workflows/07-cross-platform.yml'
      - 'Cargo.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cross-platform-build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-platform-${{ matrix.os }}

      - name: Build (Release)
        run: cargo build --release --target ${{ matrix.target }} --all-features

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }} --all-features

      - name: Verify artifacts
        shell: bash
        run: |
          echo "=== Build artifacts on ${{ matrix.os }} ==="
          find target/${{ matrix.target }}/release -maxdepth 1 -type f -executable -o -type f -name "*.a" -o -type f -name "*.so" -o -type f -name "*.dylib" -o -type f -name "*.dll" 2>/dev/null | head -20

      - name: Upload platform build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/
          retention-days: 3

  cross-platform-consistency:
    name: Cross-Platform Consistency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: cross-platform-build
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Compare outputs
        run: |
          echo "=== Cross-platform build comparison ==="
          
          # List all artifacts collected
          find builds -type f -name "qrd*" | head -10

      - name: Validate consistency
        run: |
          echo "All platform builds completed successfully"

  arm64-build:
    name: Build ARM64
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-arm64

      - name: Install cross
        run: cargo install cross

      - name: Build ARM64
        run: cross build --release --target aarch64-unknown-linux-gnu --all-features

      - name: Run ARM64 tests (cross)
        run: cross test --release --target aarch64-unknown-linux-gnu --all-features

      - name: Upload ARM64 build
        uses: actions/upload-artifact@v4
        with:
          name: build-arm64
          path: target/aarch64-unknown-linux-gnu/release/
          retention-days: 3

  wasm-cross:
    name: WASM Target
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.org/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          cd core/qrd-wasm
          wasm-pack build --target web --release

      - name: Verify WASM output
        run: |
          test -f core/qrd-wasm/pkg/qrd_wasm.js
          test -f core/qrd-wasm/pkg/qrd_wasm_bg.wasm
          
          echo "WASM artifacts:"
          ls -lh core/qrd-wasm/pkg/*.wasm core/qrd-wasm/pkg/*.js | head -5

      - name: Upload WASM build
        uses: actions/upload-artifact@v4
        with:
          name: build-wasm
          path: core/qrd-wasm/pkg/
          retention-days: 3

  minimum-versions:
    name: Minimum Supported Versions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.56.0

      - name: Check minimal version compatibility
        run: |
          echo "=== Testing with Rust 1.56.0 ==="
          cargo check --all-features 2>&1 | tail -20

      - name: Report results
        run: |
          echo "Minimum supported Rust version check completed"
