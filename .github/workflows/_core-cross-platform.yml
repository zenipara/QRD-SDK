name: Core Cross-Platform
# Shared reusable workflow for cross-platform builds

on:
  workflow_call:
    inputs:
      commands:
        description: 'Commands to run'
        type: string
        required: true
      artifact-name:
        description: 'Artifact name for uploads'
        type: string
        default: ''
        required: false
      artifact-path:
        description: 'Artifact path for uploads'
        type: string
        default: ''
        required: false
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 30
        required: false

jobs:
  cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-

      - name: Execute commands
        run: |
          set -euo pipefail
          ${{ inputs.commands }}
        shell: bash

      - name: Upload artifacts
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ matrix.os }}
          path: ${{ inputs.artifact-path }}
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## Cross-Platform Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "- OS: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commands executed: ${{ inputs.commands }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY