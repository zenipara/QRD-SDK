name: Format
# Rust formatting validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --all