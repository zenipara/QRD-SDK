name: Memory
# Bounded-memory validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory:
    uses: ./.github/workflows/_core-heavy.yml
    with:
      job-type: memory
      commands: |
        cargo test --workspace -- --ignored memory_profiling
        valgrind --tool=massif --massif-out-file=massif.out.%p cargo test memory_profiling
      artifact-name: memory-reports
      artifact-path: massif.out.*
      timeout: 45