name: Sanitizers
# ASAN + TSAN + UBSAN runs

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  address:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: sanitizer-address
      commands: RUSTFLAGS="-Zsanitizer=address" cargo test --workspace --target x86_64-unknown-linux-gnu
      timeout: 45

  thread:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: sanitizer-thread
      commands: RUSTFLAGS="-Zsanitizer=thread" cargo test --workspace --target x86_64-unknown-linux-gnu
      timeout: 45

  undefined:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: sanitizer-undefined
      commands: RUSTFLAGS="-Zsanitizer=undefined" cargo test --workspace --target x86_64-unknown-linux-gnu
      timeout: 45