name: Deterministic

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/qrd-core/src/**'
      - '.github/workflows/05-deterministic.yml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/qrd-core/src/**'
      - '.github/workflows/05-deterministic.yml'
      - 'Cargo.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deterministic-binary:
    name: Binary Determinism (${{ matrix.iteration }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        iteration: [1, 2, 3]  # Run 3 times to ensure consistency
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: deterministic-${{ matrix.iteration }}

      - name: Build (Release)
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu --all-features
          mkdir -p build_artifacts
          cp target/x86_64-unknown-linux-gnu/release/qrd_* build_artifacts/ || true

      - name: Compute binary hash
        id: hash
        run: |
          echo "hash=$(sha256sum build_artifacts/* | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          sha256sum build_artifacts/* > build_artifacts/checksums_${{ matrix.iteration }}.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-build-${{ matrix.iteration }}
          path: build_artifacts/
          retention-days: 7

      - name: Print hash
        run: echo "Build ${{ matrix.iteration }} hash: ${{ steps.hash.outputs.hash }}"

  deterministic-compare:
    name: Compare Determinism
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deterministic-binary
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Compare checksums
        run: |
          echo "=== Comparing deterministic builds ==="
          for i in 1 2 3; do
            if [ -f builds/deterministic-build-$i/checksums_$i.txt ]; then
              echo "--- Build $i checksums ---"
              cat builds/deterministic-build-$i/checksums_$i.txt
            fi
          done

          # Extract hashes and compare
          hash1=$(cd builds/deterministic-build-1 && sha256sum * | sha256sum | cut -d' ' -f1)
          hash2=$(cd builds/deterministic-build-2 && sha256sum * | sha256sum | cut -d' ' -f1)
          hash3=$(cd builds/deterministic-build-3 && sha256sum * | sha256sum | cut -d' ' -f1)

          echo ""
          echo "Hash 1: $hash1"
          echo "Hash 2: $hash2"
          echo "Hash 3: $hash3"

          if [ "$hash1" = "$hash2" ] && [ "$hash2" = "$hash3" ]; then
            echo "✓ All builds are deterministic!"
            exit 0
          else
            echo "✗ MISMATCH: Builds are NOT deterministic"
            exit 1
          fi

  deterministic-serialization:
    name: Serialization Determinism
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: deterministic-serialization

      - name: Build test binary
        run: |
          cargo build --release --example basic_writer

      - name: Generate test datasets
        run: |
          mkdir -p test_outputs
          for i in {1..5}; do
            ./target/release/examples/basic_writer > test_outputs/dataset_$i.qrd || echo "Run $i"
          done

      - name: Compute file hashes
        run: |
          echo "=== Output file hashes ==="
          sha256sum test_outputs/*.qrd

          # All should be identical
          hash1=$(sha256sum test_outputs/dataset_1.qrd | cut -d' ' -f1)
          hash2=$(sha256sum test_outputs/dataset_2.qrd | cut -d' ' -f1)
          hash3=$(sha256sum test_outputs/dataset_3.qrd | cut -d' ' -f1)
          hash4=$(sha256sum test_outputs/dataset_4.qrd | cut -d' ' -f1)
          hash5=$(sha256sum test_outputs/dataset_5.qrd | cut -d' ' -f1)

          if [ "$hash1" = "$hash2" ] && [ "$hash2" = "$hash3" ] && [ "$hash3" = "$hash4" ] && [ "$hash4" = "$hash5" ]; then
            echo "✓ Serialization is deterministic"
            exit 0
          else
            echo "✗ Serialization is NOT deterministic"
            exit 1
          fi

      - name: Upload test data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-test-data
          path: test_outputs/

  deterministic-footer:
    name: Footer Determinism
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: deterministic-footer

      - name: Build footer validator
        run: cargo build --release --example basic_reader

      - name: Test footer parsing consistency
        run: |
          # Create a test file and verify footer is always parsed identically
          ./target/release/examples/basic_writer > test.qrd
          
          echo "=== Footer parsing (run 1) ==="
          ./target/release/examples/basic_reader test.qrd 2>&1 | tee footer_run1.txt
          
          echo "=== Footer parsing (run 2) ==="
          ./target/release/examples/basic_reader test.qrd 2>&1 | tee footer_run2.txt
          
          if diff -u footer_run1.txt footer_run2.txt; then
            echo "✓ Footer parsing is deterministic"
          else
            echo "✗ Footer parsing differs"
            exit 1
          fi

      - name: Upload footer validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: footer-validation
          path: footer_run*.txt
