name: Core Security
# Shared reusable workflow for security scanning

on:
  workflow_call:
    inputs:
      scan-type:
        description: 'Security scan type (audit, deny, codeql, etc.)'
        type: string
        required: true
      commands:
        description: 'Commands to run'
        type: string
        required: true
      artifact-name:
        description: 'Artifact name for uploads'
        type: string
        default: ''
        required: false
      artifact-path:
        description: 'Artifact path for uploads'
        type: string
        default: ''
        required: false
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 15
        required: false
    outputs:
      scan-results:
        description: 'Scan results summary'
        value: ${{ jobs.security.outputs.scan-results }}

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      scan-results: ${{ steps.scan.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        if: inputs.scan-type == 'audit' || inputs.scan-type == 'deny'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: inputs.scan-type == 'audit' || inputs.scan-type == 'deny'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-security-${{ hashFiles('**/Cargo.lock') }}

      - name: Initialize CodeQL
        if: inputs.scan-type == 'codeql'
        uses: github/codeql-action/init@v2
        with:
          languages: rust

      - name: Execute security scan
        id: scan
        run: |
          set -euo pipefail
          ${{ inputs.commands }}
          echo "result=completed" >> $GITHUB_OUTPUT

      - name: Perform CodeQL Analysis
        if: inputs.scan-type == 'codeql'
        uses: github/codeql-action/analyze@v2

      - name: Upload artifacts
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Scan type: ${{ inputs.scan-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commands executed: ${{ inputs.commands }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY