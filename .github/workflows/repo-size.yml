name: Repository Size

# Detect repository size regressions and oversized artifacts
# Tracks growth trends and fails on threshold violations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-size:
    name: Check Repository Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Measure repository sizes
        id: measure
        run: |
          echo "## Repository Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Measuring repository and artifact sizes..." >> $GITHUB_STEP_SUMMARY

          # Repository size (excluding .git)
          REPO_SIZE=$(du -sb --exclude=.git . | cut -f1)
          REPO_SIZE_MB=$((REPO_SIZE / 1024 / 1024))

          # Core binary sizes
          cargo build --release --workspace
          CORE_BINARY_SIZE=$(stat -c%s target/release/libqrd_core.rlib 2>/dev/null || echo 0)
          CORE_BINARY_MB=$((CORE_BINARY_SIZE / 1024 / 1024))

          # WASM binary size
          cd core/qrd-wasm
          cargo build --release --target wasm32-unknown-unknown
          WASM_SIZE=$(stat -c%s target/wasm32-unknown-unknown/release/qrd_wasm.wasm 2>/dev/null || echo 0)
          WASM_MB=$((WASM_SIZE / 1024 / 1024))
          cd ../..

          # SDK binary sizes
          cd sdk/python
          pip install -e . 2>/dev/null || true
          PYTHON_BINARY_SIZE=$(du -sb . | cut -f1)
          PYTHON_BINARY_MB=$((PYTHON_BINARY_SIZE / 1024 / 1024))
          cd ../..

          # Benchmark artifacts
          BENCH_SIZE=$(du -sb bench/ 2>/dev/null | cut -f1 || echo 0)
          BENCH_MB=$((BENCH_SIZE / 1024 / 1024))

          # Docs size
          DOCS_SIZE=$(du -sb docs/ 2>/dev/null | cut -f1 || echo 0)
          DOCS_MB=$((DOCS_SIZE / 1024 / 1024))

          # Specs size
          SPECS_SIZE=$(du -sb specs/ 2>/dev/null | cut -f1 || echo 0)
          SPECS_MB=$((SPECS_SIZE / 1024 / 1024))

          # Generate report
          echo "### Size Measurements" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${REPO_SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Binary | ${CORE_BINARY_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| WASM Binary | ${WASM_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Python SDK | ${PYTHON_BINARY_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmarks | ${BENCH_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${DOCS_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Specifications | ${SPECS_MB} MB |" >> $GITHUB_STEP_SUMMARY

          # Check thresholds (example thresholds - adjust based on project needs)
          REGRESSIONS=0

          if [ "$REPO_SIZE_MB" -gt 500 ]; then
            echo "⚠️ Repository size exceeds 500MB threshold" >> $GITHUB_STEP_SUMMARY
            REGRESSIONS=$((REGRESSIONS + 1))
          fi

          if [ "$CORE_BINARY_MB" -gt 50 ]; then
            echo "⚠️ Core binary size exceeds 50MB threshold" >> $GITHUB_STEP_SUMMARY
            REGRESSIONS=$((REGRESSIONS + 1))
          fi

          if [ "$WASM_MB" -gt 10 ]; then
            echo "⚠️ WASM binary size exceeds 10MB threshold" >> $GITHUB_STEP_SUMMARY
            REGRESSIONS=$((REGRESSIONS + 1))
          fi

          if [ "$BENCH_MB" -gt 100 ]; then
            echo "⚠️ Benchmark artifacts exceed 100MB threshold" >> $GITHUB_STEP_SUMMARY
            REGRESSIONS=$((REGRESSIONS + 1))
          fi

          echo "### Regressions Detected: $REGRESSIONS" >> $GITHUB_STEP_SUMMARY

          # Save measurements for trend analysis
          echo "REPO_SIZE_MB=$REPO_SIZE_MB" >> $GITHUB_OUTPUT
          echo "CORE_BINARY_MB=$CORE_BINARY_MB" >> $GITHUB_OUTPUT
          echo "WASM_MB=$WASM_MB" >> $GITHUB_OUTPUT
          echo "REGRESSIONS=$REGRESSIONS" >> $GITHUB_OUTPUT

      - name: Generate trend report
        run: |
          echo "### Size Trend Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Current measurements saved for future trend comparison." >> $GITHUB_STEP_SUMMARY
          echo "Set up historical data storage for proper trend analysis." >> $GITHUB_STEP_SUMMARY

      - name: Fail on size regressions
        run: |
          if [ "$REGRESSIONS" -gt 0 ]; then
            echo "Repository size regressions detected. Please review and optimize."
            exit 1
          fi

      - name: Upload size report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-size-report
          path: |
            size_measurements.json
          if-no-files-found: warn
          retention-days: 30