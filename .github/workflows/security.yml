name: Security
# Dependency vulnerability scanning

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    uses: ./.github/workflows/_core-security.yml
    with:
      scan-type: audit
      commands: |
        cargo install cargo-audit
        cargo audit
      artifact-name: security-audit-report
      artifact-path: audit_report.txt