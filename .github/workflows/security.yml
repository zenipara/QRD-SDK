name: Security
# Security, dependency, and unused dependency scanning

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    uses: ./.github/workflows/_core-security.yml
    with:
      scan-type: audit
      commands: |
        cargo install cargo-audit
        cargo audit
      artifact-name: security-audit-report
      artifact-path: audit_report.txt

  deny:
    uses: ./.github/workflows/_core-security.yml
    with:
      scan-type: deny
      commands: |
        cargo install cargo-deny
        cargo deny check
      artifact-name: cargo-deny-report
      artifact-path: deny_report.txt

  udeps:
    name: Detect Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-udeps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-udeps-

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Run cargo udeps analysis
        run: |
          echo "## Cargo Udeps Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Detecting unused dependencies in workspace..." >> $GITHUB_STEP_SUMMARY
          cargo +nightly udeps --workspace --output json > udeps-report.json || true

      - name: Process udeps results
        run: |
          if [ -f udeps-report.json ]; then
            echo "### Unused Dependencies Found:" >> $GITHUB_STEP_SUMMARY
            cat udeps-report.json | jq -r '.unused_deps[]? | "- \(.name) (\(.kind))"' >> $GITHUB_STEP_SUMMARY || echo "No unused dependencies detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "No udeps report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail on unused dependencies
        run: |
          if [ -f udeps-report.json ] && [ "$(cat udeps-report.json | jq '.unused_deps | length')" -gt 0 ]; then
            echo "Unused dependencies detected. Please remove them to reduce dependency bloat."
            exit 1
          fi

      - name: Upload udeps report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-udeps-report
          path: udeps-report.json
          if-no-files-found: warn
          retention-days: 30