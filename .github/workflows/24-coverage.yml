name: Coverage

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
      - '.github/workflows/24-coverage.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
      - '.github/workflows/24-coverage.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  tarpaulin:
    name: Coverage (Tarpaulin)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: |
          cargo tarpaulin \
            --all-features \
            --timeout 120 \
            --out Xml \
            --output-dir coverage \
            --exclude-files tests/* examples/* \
            --fail-under 70

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  llvm-cov:
    name: Coverage (LLVM)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage-llvm

      - name: Install llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate LLVM coverage
        run: |
          cargo llvm-cov \
            --all-features \
            --lcov \
            --output-path lcov.info

      - name: Upload LLVM coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov.info
          flags: llvm-coverage
          fail_ci_if_error: false

      - name: Generate HTML report
        run: cargo llvm-cov --html

      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        with:
          name: llvm-coverage-html
          path: target/llvm-cov/html/
          retention-days: 30

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [tarpaulin, llvm-cov]
    if: always()
    steps:
      - name: Generate summary
        run: |
          cat > coverage_summary.txt << 'EOF'
          # Code Coverage Report
          
          ## Tools
          - Tarpaulin: Completed
          - LLVM-COV: Completed
          
          ## Summary
          Coverage analysis completed.
          Detailed reports available in artifacts.
          
          Target: >= 70% coverage
          EOF
          
          cat coverage_summary.txt

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage_summary.txt
          retention-days: 30
