name: CI
# Core workspace compile + test + lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Core CI Pipeline
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      components: clippy,rustfmt
      cache-key: ci
      commands: |
        cargo build --workspace --release
        cargo test --workspace --verbose
        cargo clippy --workspace -- -D warnings
        cargo fmt --check
      artifact-name: ci-artifacts
      artifact-path: target/release/
      fail-fast: true
      timeout: 60

  validation:
    name: Validation Pipeline
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      components: clippy,rustfmt
      cache-key: validation
      commands: |
        ./scripts/install-tools.sh
        bash ./scripts/validate.sh --mode=standard --report-dir=scripts/reports/latest
      artifact-name: validation-reports
      artifact-path: scripts/reports/latest
      fail-fast: true
      timeout: 90
