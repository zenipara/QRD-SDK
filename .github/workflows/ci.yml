name: CI
# Central CI gate for push/PR validation. Task-specific workflows are manual or scheduled only to avoid duplicate runs.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Core CI Pipeline
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      components: clippy,rustfmt
      cache-key: ci
      commands: |
        cargo build --workspace --release
        cargo test --workspace --verbose
        cargo clippy --workspace -- -D warnings
        cargo fmt --check
      artifact-name: ci-artifacts
      artifact-path: target/release/
      fail-fast: true
      timeout: 60
