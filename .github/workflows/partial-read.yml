name: Partial Read
# Partial column read validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  partial-read:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run partial read tests
        run: cargo test --workspace -- --ignored partial_read

      - name: Validate partial column reads
        run: |
          # Run specific partial read validation
          cargo run --bin validate_partial_reads

      - name: Upload partial read report
        uses: actions/upload-artifact@v4
        with:
          name: partial-read-report
          path: partial_read_output.log