name: Cargo Audit
# Rust crate CVE scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: ./.github/workflows/_core-security.yml
    with:
      scan-type: audit
      commands: |
        cargo install cargo-audit
        cargo audit --format json | tee audit.json
        if jq -e '.vulnerabilities.found == true' audit.json > /dev/null; then
          echo "Vulnerabilities found!"
          exit 1
        fi
      artifact-name: cargo-audit-results
      artifact-path: audit.json