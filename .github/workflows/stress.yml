name: Stress
# Extreme workload stress tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  stress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build stress test binary
        run: cargo build --bin stress_test --release

      - name: Run stress tests
        run: |
          ./target/release/stress_test --huge-dataset
          ./target/release/stress_test --parallel-readers 10
          ./target/release/stress_test --repeated-flush 1000

      - name: Upload stress logs
        uses: actions/upload-artifact@v4
        with:
          name: stress-logs
          path: stress_output.log