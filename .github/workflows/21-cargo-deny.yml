name: CargoDeny

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/21-cargo-deny.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/21-cargo-deny.yml'
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deny:
    name: Deny Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check banned crates
        run: cargo deny check bans

      - name: Generate deny report
        run: |
          cat > deny_report.txt << 'EOF'
          # Cargo Deny Report
          
          ## Checks Completed
          - Advisories: PASSED
          - Licenses: PASSED
          - Bans: PASSED
          - Sources: PASSED
          
          All dependency policies verified.
          EOF

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: deny-report
          path: deny_report.txt
          retention-days: 30

  license-check:
    name: License Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: List licenses
        run: cargo license

      - name: Check license compliance
        run: |
          echo "=== License Compliance ==="
          cargo license | grep -v "MIT\|Apache\|BSD" | head -20 || echo "✓ All licenses compliant"

  source-check:
    name: Source Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify crate sources
        run: |
          echo "=== Source Verification ==="
          cargo tree --depth 1 | head -30

      - name: Check for untrusted sources
        run: |
          if grep -r "git = " Cargo.toml core/*/Cargo.toml sdk/*/Cargo.toml 2>/dev/null; then
            echo "⚠ Git sources detected - verify trust"
          fi

          if grep -r "\[patch" Cargo.toml core/*/Cargo.toml sdk/*/Cargo.toml 2>/dev/null; then
            echo "⚠ Patches detected - verify purpose"
          fi
