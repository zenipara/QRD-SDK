name: Python SDK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'sdk/python/**'
      - 'core/qrd-ffi/**'
      - '.github/workflows/09-sdk-python.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'sdk/python/**'
      - 'core/qrd-ffi/**'
      - '.github/workflows/09-sdk-python.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  python-build:
    name: Build Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: python-sdk-build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'sdk/python/requirements.txt'

      - name: Install build dependencies
        run: |
          pip install maturin wheel setuptools

      - name: Build Python SDK
        run: |
          cd sdk/python
          maturin develop --release

      - name: Verify installation
        run: |
          python -c "import qrd; print('QRD Python binding loaded')"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: sdk/python/target/wheels/
          retention-days: 3

  python-test:
    name: Test Python SDK (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: python-test-${{ matrix.python-version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build dependencies
        run: |
          pip install maturin pytest pytest-cov

      - name: Build extension
        run: |
          cd sdk/python
          maturin develop --release

      - name: Run pytest
        run: |
          cd sdk/python
          pytest tests/ -v --cov=qrd --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./sdk/python/coverage.xml
          flags: python-${{ matrix.python-version }}

  python-lint:
    name: Lint Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install pylint mypy black isort

      - name: Format check
        run: |
          cd sdk/python
          black --check qrd/ tests/

      - name: Lint
        run: |
          cd sdk/python
          pylint qrd/ || echo "Lint warnings (non-blocking)"

      - name: Type check
        run: |
          cd sdk/python
          mypy qrd/ || echo "Type warnings (non-blocking)"

      - name: Import sorting
        run: |
          cd sdk/python
          isort --check-only qrd/ tests/

  python-integration:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: python-integration

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd sdk/python
          pip install -e .
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          cd sdk/python
          pytest tests/integration/ -v

      - name: Test streaming
        run: |
          cd sdk/python
          pytest tests/streaming/ -v || echo "Streaming tests optional"

      - name: Cross-language validation
        run: |
          cd sdk/python
          python tests/cross_lang_validation.py || echo "Cross-lang tests optional"

  python-cross-platform:
    name: Python Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install maturin pytest

      - name: Build Python SDK
        run: |
          cd sdk/python
          maturin develop --release

      - name: Test
        run: |
          cd sdk/python
          pytest tests/ -v
