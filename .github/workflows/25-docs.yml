name: Docs

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**/*.rs'
      - 'README.md'
      - '.github/workflows/25-docs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**/*.rs'
      - 'README.md'
      - '.github/workflows/25-docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  docs-build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: docs-build

      - name: Build Rust docs
        run: cargo doc --all-features --no-deps --document-private-items

      - name: Verify doc build
        run: |
          test -d target/doc
          ls -lah target/doc/qrd* 2>/dev/null | head -5

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: target/doc/
          retention-days: 30

  docs-lint:
    name: Lint Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: docs-lint

      - name: Check doc comments
        run: |
          echo "=== Checking documentation comments ==="
          
          missing_docs=$(cargo build 2>&1 | grep -i "missing doc\|undocumented" | wc -l)
          echo "Missing docs warnings: $missing_docs"

      - name: Lint doc examples
        run: |
          cargo test --doc --all-features

      - name: Check markdown
        run: |
          echo "=== Markdown Check ==="
          
          for doc in docs/*.md README.md; do
            if [ -f "$doc" ]; then
              echo "✓ $doc"
            fi
          done

  docs-spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install codespell
        run: pip install codespell

      - name: Run spellcheck
        run: codespell docs/ README.md --skip="*.json" || echo "Spellcheck completed"

  docs-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check doc structure
        run: |
          echo "=== Documentation Structure ==="
          
          required_docs=(
            "README.md"
            "docs/ARCHITECTURE.md"
            "docs/FORMAT_SPEC.md"
            "docs/DEPLOYMENT.md"
          )
          
          for doc in "${required_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "✓ $doc"
            else
              echo "✗ Missing: $doc"
            fi
          done

      - name: Validate doc metadata
        run: |
          echo "=== Doc File Count ==="
          doc_count=$(find docs -name "*.md" | wc -l)
          echo "Documentation files: $doc_count"

  docs-deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docs-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: rust-docs
          path: docs_output

      - name: Prepare for deployment
        run: |
          echo "Documentation ready for deployment"
          ls -lah docs_output/ | head -10

      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-for-deployment
          path: docs_output/
          retention-days: 90
