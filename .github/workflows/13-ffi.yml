name: FFI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/qrd-ffi/**'
      - '.github/workflows/13-ffi.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/qrd-ffi/**'
      - '.github/workflows/13-ffi.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ffi-build:
    name: Build FFI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: libqrd_ffi.so
          - os: macos-latest
            artifact: libqrd_ffi.dylib
          - os: windows-latest
            artifact: qrd_ffi.dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-build-${{ matrix.os }}

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Verify artifact
        shell: bash
        run: |
          if [ -f core/qrd-ffi/target/release/${{ matrix.artifact }} ]; then
            ls -lh core/qrd-ffi/target/release/${{ matrix.artifact }}
            echo "✓ FFI artifact exists"
          else
            echo "✗ Expected artifact not found"
            exit 1
          fi

      - name: Extract symbols (Unix)
        if: runner.os != 'Windows'
        run: |
          nm -D core/qrd-ffi/target/release/${{ matrix.artifact }} 2>/dev/null | grep qrd | head -20 || echo "OK"

      - name: Extract symbols (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Content "core\qrd-ffi\target\release\${{ matrix.artifact }}" | head -c 100

      - name: Upload FFI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffi-${{ matrix.os }}
          path: core/qrd-ffi/target/release/${{ matrix.artifact }}
          retention-days: 3

  ffi-abi-check:
    name: ABI Stability Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-abi-check

      - name: Install abidiff
        run: |
          sudo apt-get update
          sudo apt-get install -y abigail-tools

      - name: Build current FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Build base FFI
        run: |
          git checkout main -- core/qrd-ffi/ || echo "No main branch"
          cargo build --release --manifest-path core/qrd-ffi/Cargo.toml --quiet || echo "Base build optional"

      - name: Check ABI compatibility
        run: |
          if [ -f core/qrd-ffi/target/release/libqrd_ffi.so ]; then
            echo "=== ABI Compatibility Check ==="
            abidiff core/qrd-ffi/target/release/libqrd_ffi.so.old core/qrd-ffi/target/release/libqrd_ffi.so || true
          fi
        continue-on-error: true

  ffi-header-validation:
    name: Header File Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check header consistency
        run: |
          echo "=== FFI Header Check ==="
          test -f core/qrd-ffi/src/qrd.h
          
          echo "Header exports:"
          grep "^[^ ].*(" core/qrd-ffi/src/qrd.h | head -10

      - name: Validate C declarations
        run: |
          # C code should compile
          gcc -c -I core/qrd-ffi/src core/qrd-ffi/src/qrd.h -o /tmp/qrd.o || true

  ffi-documentation:
    name: FFI Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation
        run: |
          echo "=== FFI Documentation Check ==="
          test -f core/qrd-ffi/README.md
          cat core/qrd-ffi/README.md | head -30

      - name: Validate examples
        run: |
          echo "=== FFI Examples ==="
          if [ -d core/qrd-ffi/examples ]; then
            ls -lah core/qrd-ffi/examples/
          fi

  ffi-integration:
    name: FFI Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-integration

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Run FFI tests
        run: cargo test --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: FFI memory safety check
        run: |
          echo "=== FFI Safety Verification ==="
          # Check for unsafe blocks
          grep -n "unsafe {" core/qrd-ffi/src/*.rs | wc -l | xargs echo "Unsafe blocks found:"
          
          # All should have comments
          if grep -B1 "unsafe {" core/qrd-ffi/src/*.rs | grep -v "//" -v "-"; then
            echo "Warning: Find unsafe blocks without comments"
          fi

  ffi-symbol-check:
    name: Symbol Visibility Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-symbols

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: List public symbols
        run: |
          echo "=== Public FFI Symbols ==="
          nm -D core/qrd-ffi/target/release/libqrd_ffi.so 2>/dev/null | grep " T " | head -20 || echo "Read-only symbols check"

      - name: Validate no undefined references
        run: |
          ldd -r core/qrd-ffi/target/release/libqrd_ffi.so 2>&1 | grep -i "undefined" || echo "✓ No undefined symbols"
