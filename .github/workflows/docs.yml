name: Docs
# Documentation build validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: docs
      commands: cargo doc --workspace --no-deps
      artifact-name: rust-docs
      artifact-path: target/doc/
      timeout: 20