name: Format

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
      - '.github/workflows/02-fmt.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
      - '.github/workflows/02-fmt.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: false

      - name: Print format diff (if failed)
        if: failure()
        run: |
          echo "=== Format issues found ==="
          cargo fmt --all -- --check -v 2>&1 | head -50

      - name: Suggest fix
        if: failure()
        run: |
          echo "Run: cargo fmt --all"
