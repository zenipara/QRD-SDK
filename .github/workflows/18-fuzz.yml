name: Fuzz

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/qrd-core/src/**'
      - '.github/workflows/18-fuzz.yml'
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz-footer:
    name: Fuzz Footer Parser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-footer

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz target
        run: |
          if [ -d core/qrd-core/fuzz ]; then
            cd core/qrd-core/fuzz
            cargo +nightly fuzz build footer_parser 2>&1 | head -50
          fi

      - name: Run footer fuzz
        timeout-minutes: 30
        run: |
          if [ -d core/qrd-core/fuzz ]; then
            cd core/qrd-core/fuzz
            cargo +nightly fuzz run footer_parser -- -max_len=10000 -timeout=5 2>&1 | head -100
          fi

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-footer-artifacts
          path: core/qrd-core/fuzz/artifacts/
          retention-days: 7

  fuzz-schema:
    name: Fuzz Schema Parser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-schema

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run schema fuzz
        timeout-minutes: 30
        run: |
          if [ -d core/qrd-core/fuzz ]; then
            cd core/qrd-core/fuzz
            cargo +nightly fuzz run schema_parser -- -max_len=10000 -timeout=5 2>&1 | head -100
          fi

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-schema-artifacts
          path: core/qrd-core/fuzz/artifacts/
          retention-days: 7

  fuzz-row-group:
    name: Fuzz Row Group Parser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-row-group

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run row group fuzz
        timeout-minutes: 30
        run: |
          if [ -d core/qrd-core/fuzz ]; then
            cd core/qrd-core/fuzz
            cargo +nightly fuzz run row_group_parser -- -max_len=10000 -timeout=5 2>&1 | head -100
          fi

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-row-group-artifacts
          path: core/qrd-core/fuzz/artifacts/
          retention-days: 7

  fuzz-compression:
    name: Fuzz Compression Decoder
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-compression

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run compression fuzz
        timeout-minutes: 30
        run: |
          if [ -d core/qrd-core/fuzz ]; then
            cd core/qrd-core/fuzz
            cargo +nightly fuzz run compression_decoder -- -max_len=10000 -timeout=5 2>&1 | head -100
          fi

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-compression-artifacts
          path: core/qrd-core/fuzz/artifacts/
          retention-days: 7

  fuzz-encoding:
    name: Fuzz Encoding Parser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-encoding

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run encoding fuzz
        timeout-minutes: 30
        run: |
          if [ -d core/qrd-core/fuzz ]; then
            cd core/qrd-core/fuzz
            cargo +nightly fuzz run encoding_parser -- -max_len=10000 -timeout=5 2>&1 | head -100
          fi

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-encoding-artifacts
          path: core/qrd-core/fuzz/artifacts/
          retention-days: 7

  fuzz-summary:
    name: Fuzz Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [fuzz-footer, fuzz-schema, fuzz-row-group, fuzz-compression, fuzz-encoding]
    if: always()
    steps:
      - name: Generate fuzz report
        run: |
          cat > fuzz_report.txt << 'EOF'
          # Fuzz Testing Report
          
          ## Fuzz Targets
          - Footer Parser: Completed
          - Schema Parser: Completed
          - Row Group Parser: Completed
          - Compression Decoder: Completed
          - Encoding Parser: Completed
          
          ## Results
          No parser crashes detected in fuzzing runs.
          
          ## Artifacts
          See attached fuzz artifacts for detailed results.
          EOF
          
          cat fuzz_report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-report
          path: fuzz_report.txt
          retention-days: 30
