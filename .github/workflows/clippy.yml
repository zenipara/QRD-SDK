name: Clippy
# Strict lint enforcement

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      components: clippy
      cache-key: clippy
      commands: cargo clippy --workspace -- -D warnings
      timeout: 15