name: Clippy
# Strict lint enforcement

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      components: clippy
      cache-key: clippy
      commands: cargo clippy --workspace -- -D warnings
      timeout: 15