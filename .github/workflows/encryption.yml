name: Encryption
# Encryption/ECC integration tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  encryption:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run encryption tests
        run: cargo test --workspace --features encryption -- --ignored encryption

      - name: Run ECC tests
        run: cargo test --workspace --features ecc -- --ignored ecc

      - name: Validate encryption integration
        run: |
          # Test encryption/decryption roundtrip
          cargo run --bin test_encryption

      - name: Upload encryption test results
        uses: actions/upload-artifact@v4
        with:
          name: encryption-test-results
          path: encryption_output.log