name: Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'sdk/**'
      - '.github/workflows/04-test.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'sdk/**'
      - '.github/workflows/04-test.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  test-core:
    name: Test Core (${{ matrix.test-type }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        test-type:
          - unit
          - integration
          - all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-core-${{ matrix.test-type }}

      - name: Run unit tests
        if: matrix.test-type == 'unit' || matrix.test-type == 'all'
        run: cargo test --lib --all-features --manifest-path core/qrd-core/Cargo.toml

      - name: Run integration tests
        if: matrix.test-type == 'integration' || matrix.test-type == 'all'
        run: cargo test --test '*' --all-features --manifest-path core/qrd-core/Cargo.toml

      - name: Run doc tests
        if: matrix.test-type == 'all'
        run: cargo test --doc --all-features --manifest-path core/qrd-core/Cargo.toml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core-${{ matrix.test-type }}
          path: target/

  test-ffi:
    name: Test FFI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-ffi

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Run FFI tests
        run: cargo test --all-features --manifest-path core/qrd-ffi/Cargo.toml

      - name: Verify FFI symbols
        run: |
          nm -D core/qrd-ffi/target/release/libqrd_ffi.so 2>/dev/null | grep qrd || echo "OK on non-Linux"

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.org/wasm-pack/installer/init.sh -sSf | sh

      - name: Test WASM
        run: |
          cd core/qrd-wasm
          wasm-pack test --headless --firefox

  test-matrix:
    name: Test (${{ matrix.rust-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        rust-version:
          - stable
          - beta
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@${{ matrix.rust-version }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.rust-version }}

      - name: Run all tests
        run: cargo test --all-features

  test-features:
    name: Test Features (${{ matrix.features }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        features:
          - default
          - streaming
          - compression
          - advanced
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-features-${{ matrix.features }}

      - name: Map features
        id: features
        run: |
          case "${{ matrix.features }}" in
            streaming) echo "flags=--features streaming" >> $GITHUB_OUTPUT ;;
            compression) echo "flags=--features compression" >> $GITHUB_OUTPUT ;;
            advanced) echo "flags=--all-features" >> $GITHUB_OUTPUT ;;
            *) echo "flags=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Test with ${{ matrix.features }} features
        run: cargo test ${{ steps.features.outputs.flags }}

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-coverage

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --all-features --timeout 120 --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true
          verbose: true
