name: Core Rust
# Shared reusable workflow for Rust-based CI jobs

on:
  workflow_call:
    inputs:
      rust-version:
        description: 'Rust toolchain version'
        type: string
        default: 'stable'
        required: false
      components:
        description: 'Rust components to install'
        type: string
        default: ''
        required: false
      cache-key:
        description: 'Cache key suffix'
        type: string
        default: 'default'
        required: false
      commands:
        description: 'Commands to run'
        type: string
        required: true
      artifact-name:
        description: 'Artifact name for uploads'
        type: string
        default: ''
        required: false
      artifact-path:
        description: 'Artifact path for uploads'
        type: string
        default: ''
        required: false
      fail-fast:
        description: 'Fail fast on errors'
        type: boolean
        default: true
        required: false
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 30
        required: false
    outputs:
      cache-hit:
        description: 'Whether cache was hit'
        value: ${{ jobs.rust.outputs.cache-hit }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust ${{ inputs.rust-version }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: ${{ inputs.components }}

      - name: Configure Cargo
        run: |
          echo "Configuring Cargo for deterministic builds..."
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [registries.crates-io]
          protocol = "sparse"

          [net]
          retry = 10

          [build]
          incremental = false
          EOF

      - name: Cache Cargo
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ inputs.rust-version }}-${{ inputs.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ inputs.rust-version }}-${{ inputs.cache-key }}-
            ${{ runner.os }}-cargo-${{ inputs.rust-version }}-
            ${{ runner.os }}-cargo-

      - name: Execute commands
        run: |
          set -euo pipefail
          ${{ inputs.commands }}

      - name: Upload artifacts
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## Rust Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Rust version: ${{ inputs.rust-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commands executed: ${{ inputs.commands }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cache hit: ${{ steps.cache.outputs.cache-hit }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY