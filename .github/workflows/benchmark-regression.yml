name: Benchmark Regression
# Detect performance regressions

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-regression:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: benchmark-regression
      commands: |
        cargo bench --workspace -- --save-baseline current
        # Placeholder for regression detection
        echo "Regression check placeholder"
      artifact-name: benchmark-comparison
      artifact-path: target/criterion/
      timeout: 60