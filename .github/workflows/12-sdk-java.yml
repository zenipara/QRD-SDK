name: Java SDK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'sdk/java/**'
      - 'core/qrd-ffi/**'
      - '.github/workflows/12-sdk-java.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'sdk/java/**'
      - 'core/qrd-ffi/**'
      - '.github/workflows/12-sdk-java.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build:
    name: Build Java SDK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Build Java SDK
        run: |
          cd sdk/java
          mvn -B clean package -DskipTests

      - name: Verify JAR
        run: |
          ls -lah sdk/java/target/*.jar
          unzip -l sdk/java/target/*.jar | grep -E "\.(class|so|dylib)$" | head -10

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: sdk/java/target/*.jar
          retention-days: 3

  java-test:
    name: Test Java SDK (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        java-version: ['11', '17', '21']

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Set up native library
        run: |
          mkdir -p sdk/java/lib
          cp core/qrd-ffi/target/release/libqrd_ffi.so sdk/java/lib/

      - name: Run tests
        run: |
          cd sdk/java
          mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-tests-java${{ matrix.java-version }}
          path: sdk/java/target/surefire-reports/
          retention-days: 3

  java-lint:
    name: Analyze Java Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: |
          cd sdk/java
          mvn checkstyle:check || echo "Checkstyle warnings (non-blocking)"

      - name: SpotBugs
        run: |
          cd sdk/java
          mvn spotbugs:check || echo "SpotBugs warnings (non-blocking)"

      - name: SonarQube
        run: |
          cd sdk/java
          mvn clean verify sonar:sonar || echo "SonarQube analysis (non-blocking)"
        continue-on-error: true

  java-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Set up native library
        run: |
          mkdir -p sdk/java/lib
          cp core/qrd-ffi/target/release/libqrd_ffi.so sdk/java/lib/

      - name: Run integration tests
        run: |
          cd sdk/java
          mvn -B verify -Pintegration

      - name: Cross-language validation
        run: |
          cd sdk/java
          mvn -B verify -Pcross-lang || echo "Cross-lang tests optional"

  java-cross-platform:
    name: Cross-Platform Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build FFI
        run: cargo build --release --manifest-path core/qrd-ffi/Cargo.toml

      - name: Build Java SDK
        run: |
          cd sdk/java
          mvn -B clean package

      - name: Run tests
        run: |
          cd sdk/java
          mvn -B test

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-build-${{ matrix.os }}
          path: sdk/java/target/*.jar
          retention-days: 3

  java-javadoc:
    name: Generate Javadoc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generate Javadoc
        run: |
          cd sdk/java
          mvn javadoc:javadoc

      - name: Verify Javadoc
        run: |
          test -d sdk/java/target/site/apidocs
          echo "Javadoc generated successfully"

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: java-javadoc
          path: sdk/java/target/site/apidocs/
          retention-days: 3
