name: SDK TypeScript
# TypeScript SDK integration tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'sdk/typescript/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'sdk/typescript/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    uses: ./.github/workflows/_core-sdk.yml
    with:
      sdk-type: typescript
      node-version: '18'
      commands: |
        npm ci
        npm run build
        npm test
      artifact-name: typescript-dist
      artifact-path: sdk/typescript/dist/