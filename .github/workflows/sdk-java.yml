name: SDK Java
# Java SDK integration tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'sdk/java/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'sdk/java/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    uses: ./.github/workflows/_core-sdk.yml
    with:
      sdk-type: java
      java-version: '11'
      commands: |
        mvn clean compile
        mvn test
        mvn package -DskipTests
      artifact-name: java-jar
      artifact-path: sdk/java/target/*.jar