name: Core Release
# Shared reusable workflow for release processes

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release type (crates, binaries, docs, etc.)'
        type: string
        required: true
      commands:
        description: 'Commands to run'
        type: string
        required: true
      artifact-name:
        description: 'Artifact name for uploads'
        type: string
        default: ''
        required: false
      artifact-path:
        description: 'Artifact path for uploads'
        type: string
        default: ''
        required: false
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 30
        required: false
    outputs:
      release-status:
        description: 'Release status'
        value: ${{ jobs.release.outputs.release-status }}

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      release-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        if: inputs.release-type == 'crates'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: inputs.release-type == 'crates'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        if: inputs.release-type == 'docs'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Execute release commands
        run: |
          set -euo pipefail
          ${{ inputs.commands }}

      - name: Upload artifacts
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 90

      - name: Generate release notes
        if: inputs.release-type == 'crates' && github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        run: |
          echo "# Release ${{ github.ref_name }}" > release_notes.md
          echo "## Changes" >> release_notes.md
          git log --oneline ${{ github.event.before }}..${{ github.sha }} >> release_notes.md

      - name: Create GitHub release
        if: inputs.release-type == 'crates' && github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      - name: Upload release assets
        if: inputs.release-type == 'crates' && inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ inputs.artifact-path }}
          asset_name: ${{ inputs.artifact-name }}
          asset_content_type: application/octet-stream

      - name: Generate step summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Release type: ${{ inputs.release-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commands executed: ${{ inputs.commands }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY