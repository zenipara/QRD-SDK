name: Benchmark
# Performance benchmark execution

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: benchmark
      commands: cargo bench --workspace
      artifact-name: benchmark-results
      artifact-path: target/criterion/
      timeout: 60

  sanitizers:
    name: Sanitizers
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: sanitizer-suite
      commands: |
        RUSTFLAGS="-Zsanitizer=address" cargo test --workspace --target x86_64-unknown-linux-gnu
        RUSTFLAGS="-Zsanitizer=thread" cargo test --workspace --target x86_64-unknown-linux-gnu
        RUSTFLAGS="-Zsanitizer=undefined" cargo test --workspace --target x86_64-unknown-linux-gnu
      artifact-name: sanitizer-results
      artifact-path: target/
      timeout: 45

  fuzz:
    name: Fuzz
    uses: ./.github/workflows/_core-heavy.yml
    with:
      job-type: fuzz
      rust-version: nightly
      commands: |
        cargo fuzz run footer_parser -- -runs=10000
        cargo fuzz run schema_parser -- -runs=10000
        cargo fuzz run rowgroup_parser -- -runs=10000
        cargo fuzz run compression_decoder -- -runs=10000
      artifact-name: fuzz-artifacts
      artifact-path: fuzz/artifacts/
      timeout: 60

  stress:
    name: Stress
    uses: ./.github/workflows/_core-heavy.yml
    with:
      job-type: stress
      commands: |
        cargo build --bin stress_test --release
        ./target/release/stress_test --huge-dataset
        ./target/release/stress_test --parallel-readers 10
        ./target/release/stress_test --repeated-flush 1000
      artifact-name: stress-logs
      artifact-path: stress_output.log
      timeout: 60
