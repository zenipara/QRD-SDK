name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'sdk/**'
      - 'tools/**'
      - '.github/workflows/01-ci.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'sdk/**'
      - 'tools/**'
      - '.github/workflows/01-ci.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  # Core compilation and basic checks
  ci-core:
    name: Compile & Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-core-${{ matrix.profile }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Compile (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build --release --all-features
          else
            cargo build --all-features
          fi

      - name: Run tests
        run: cargo test --lib --all-features

      - name: Run integration tests
        run: cargo test --test '*' --all-features

  # WASM build check
  wasm-check:
    name: WASM Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-check

      - name: Install wasm-pack
        run: curl https://rustwasm.org/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          cd core/qrd-wasm
          wasm-pack build --target web --release

      - name: Validate WASM output
        run: |
          test -f core/qrd-wasm/pkg/qrd_wasm.js
          test -f core/qrd-wasm/pkg/qrd_wasm_bg.wasm

  # FFI build check
  ffi-check:
    name: FFI Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-check

      - name: Build FFI
        run: |
          cd core/qrd-ffi
          cargo build --release

      - name: Validate FFI artifacts
        run: |
          test -f core/qrd-ffi/target/release/libqrd_ffi.a
          test -f core/qrd-ffi/target/release/libqrd_ffi.so || echo "OK on macOS/Windows"
