name: Docs Integrity

# Detect broken internal documentation references and links
# Validates markdown links, anchors, and cross-references in documentation

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-integrity:
    name: Check Documentation Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lychee link checker
        run: |
          wget -q -O lychee.tar.gz https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf lychee.tar.gz
          sudo mv lychee /usr/local/bin/
          chmod +x /usr/local/bin/lychee

      - name: Check documentation links
        id: check-links
        run: |
          echo "## Documentation Integrity Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Checking for broken links and invalid references..." >> $GITHUB_STEP_SUMMARY

          # Check markdown files in docs, specs, and root
          lychee --format json --output docs-link-report.json \
            --include "README.md" \
            --include "docs/**/*.md" \
            --include "specs/**/*.md" \
            --exclude "target/**" \
            --exclude ".git/**" \
            --exclude "node_modules/**" \
            --exclude "**/target/**" \
            --max-concurrency 10 \
            --timeout 30 \
            --include-fragments \
            . || true

      - name: Process link check results
        run: |
          if [ -f docs-link-report.json ]; then
            BROKEN_LINKS=$(jq '.[] | select(.status == "Error") | .url' docs-link-report.json | wc -l)
            TOTAL_LINKS=$(jq length docs-link-report.json)

            echo "### Link Check Results" >> $GITHUB_STEP_SUMMARY
            echo "- Total links checked: $TOTAL_LINKS" >> $GITHUB_STEP_SUMMARY
            echo "- Broken links found: $BROKEN_LINKS" >> $GITHUB_STEP_SUMMARY

            if [ "$BROKEN_LINKS" -gt 0 ]; then
              echo "#### Broken Links:" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | select(.status == "Error") | "- [\(.url)](\(.source)) - \(.status)"' docs-link-report.json >> $GITHUB_STEP_SUMMARY
            else
              echo "No broken links detected." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No link report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for missing documentation files
        run: |
          echo "### Missing Documentation Files" >> $GITHUB_STEP_SUMMARY

          # Check for referenced but missing files in docs
          MISSING_FILES=$(find docs -name "*.md" -exec grep -l "(\.\./\|\./\|/" {} \; | xargs -I {} sh -c 'grep -oP "(?<=\()(\.\./|\./|/)[^)]*\.md(?=\))" "{}" | while read -r link; do if [ ! -f "$(dirname "{}")/$link" ] && [ ! -f "$link" ]; then echo "$link (referenced in {})"; fi; done' | wc -l)

          if [ "$MISSING_FILES" -gt 0 ]; then
            echo "Missing documentation files detected." >> $GITHUB_STEP_SUMMARY
            find docs -name "*.md" -exec grep -l "(\.\./\|\./\|/" {} \; | xargs -I {} sh -c 'grep -oP "(?<=\()(\.\./|\./|/)[^)]*\.md(?=\)" "{}" | while read -r link; do if [ ! -f "$(dirname "{}")/$link" ] && [ ! -f "$link" ]; then echo "- $link (in {})"; fi; done' >> $GITHUB_STEP_SUMMARY
          else
            echo "No missing documentation files detected." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail on documentation issues
        run: |
          BROKEN_LINKS=$(jq '.[] | select(.status == "Error") | .url' docs-link-report.json 2>/dev/null | wc -l || echo 0)
          if [ "$BROKEN_LINKS" -gt 0 ]; then
            echo "Broken documentation links detected. Please fix them."
            exit 1
          fi

      - name: Upload docs integrity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-integrity-report
          path: docs-link-report.json
          if-no-files-found: warn
          retention-days: 30