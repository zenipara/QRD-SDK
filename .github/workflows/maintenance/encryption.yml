name: Encryption
# Encryption/ECC integration tests

on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  encryption:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: encryption
      commands: |
        cargo test --workspace --features encryption -- --ignored encryption
        cargo test --workspace --features ecc -- --ignored ecc
        # Test encryption/decryption roundtrip
        cargo run --bin test_encryption
      artifact-name: encryption-test-results
      artifact-path: encryption_output.log
      timeout: 30