name: Artifact Hygiene

# Prevent repository pollution by detecting leaked artifacts and forbidden committed directories
# Scans for target/, node_modules/, .venv/, dist/, coverage/, and other generated files

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  artifact-hygiene:
    name: Check Artifact Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file jq

      - name: Detect forbidden artifacts
        id: detect
        run: |
          echo "## Artifact Hygiene Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Scanning for forbidden committed artifacts..." >> $GITHUB_STEP_SUMMARY

          # Define forbidden directories and patterns
          FORBIDDEN_DIRS=("target" "node_modules" ".venv" "venv" "__pycache__" "dist" "build" "coverage" ".coverage" "htmlcov" "benchmark-results" "crash-dumps" ".DS_Store" "Thumbs.db")
          FORBIDDEN_PATTERNS=("*.log" "*.tmp" "*.swp" "*.bak" "*.orig" "*.rej" "*.pyc" "*.pyo" "*.class" "core.*")

          > forbidden_artifacts.txt
          > oversized_binaries.txt

          # Check for forbidden directories
          for dir in "${FORBIDDEN_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              find "$dir" -type f | head -20 >> forbidden_artifacts.txt
              echo "Forbidden directory committed: $dir" >> forbidden_artifacts.txt
            fi
          done

          # Check for forbidden file patterns
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            find . -name "$pattern" -not -path "./.git/*" -not -path "./target/*" | head -20 >> forbidden_artifacts.txt
          done

          # Check for oversized binaries (>10MB)
          find . -type f -not -path "./.git/*" -not -path "./target/*" -exec sh -c 'size=$(stat -c%s "$1"); if [ "$size" -gt 10485760 ]; then echo "$1 ($((size/1024/1024))MB)"; fi' _ {} \; >> oversized_binaries.txt

          # Check for executable files that shouldn't be committed
          find . -type f -executable -not -path "./.git/*" -not -path "./tools/*" -not -path "./scripts/*" -not -path "./*.sh" | while read -r file; do
            if ! head -1 "$file" | grep -q "#!"; then
              echo "Non-script executable: $file" >> forbidden_artifacts.txt
            fi
          done

          # Generate report
          FORBIDDEN_COUNT=$(wc -l < forbidden_artifacts.txt)
          OVERSIZED_COUNT=$(wc -l < oversized_binaries.txt)

          echo "### Forbidden Artifacts: $FORBIDDEN_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "### Oversized Binaries: $OVERSIZED_COUNT" >> $GITHUB_STEP_SUMMARY

          if [ "$FORBIDDEN_COUNT" -gt 0 ]; then
            echo "#### Forbidden Committed Files:" >> $GITHUB_STEP_SUMMARY
            head -10 forbidden_artifacts.txt | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
            if [ "$FORBIDDEN_COUNT" -gt 10 ]; then
              echo "- ... and $((FORBIDDEN_COUNT-10)) more" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "$OVERSIZED_COUNT" -gt 0 ]; then
            echo "#### Oversized Binary Files:" >> $GITHUB_STEP_SUMMARY
            cat oversized_binaries.txt | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$FORBIDDEN_COUNT" -eq 0 ] && [ "$OVERSIZED_COUNT" -eq 0 ]; then
            echo "No forbidden artifacts or oversized binaries detected." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail on artifact hygiene violations
        run: |
          FORBIDDEN_COUNT=$(wc -l < forbidden_artifacts.txt)
          OVERSIZED_COUNT=$(wc -l < oversized_binaries.txt)
          if [ "$FORBIDDEN_COUNT" -gt 0 ] || [ "$OVERSIZED_COUNT" -gt 0 ]; then
            echo "Forbidden artifacts or oversized binaries detected. Please remove them from the repository."
            exit 1
          fi

      - name: Upload artifact hygiene report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-hygiene-report
          path: |
            forbidden_artifacts.txt
            oversized_binaries.txt
          if-no-files-found: warn
          retention-days: 30