name: Cross-Platform
# Linux/macOS/Windows matrix validation

on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  cross-platform:
    uses: ./.github/workflows/_core-cross-platform.yml
    with:
      commands: |
        cargo build --workspace
        cargo test --workspace --lib
      timeout: 45