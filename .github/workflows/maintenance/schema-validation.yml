name: Schema Validation
# Schema evolution validation

on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  schema-validation:
    uses: ./.github/workflows/_core-rust.yml
    with:
      rust-version: stable
      cache-key: schema-validation
      commands: |
        cargo test --workspace -- --ignored schema_evolution
        # Placeholder for schema validation logic
        echo "Schema validation complete"
      artifact-name: schema-validation-report
      artifact-path: schema_report.txt
      timeout: 25