name: Nightly
# Heavy nightly validation suite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nightly:
    uses: ./.github/workflows/_core-heavy.yml
    with:
      job-type: nightly
      rust-version: nightly
      commands: |
        cargo test --workspace --release -- --nocapture
        cargo install cargo-fuzz
        cargo fuzz run footer_parser -- -runs=50000
        cargo test --workspace -- --ignored stress
      artifact-name: nightly-report
      artifact-path: nightly_output.log
      timeout: 120