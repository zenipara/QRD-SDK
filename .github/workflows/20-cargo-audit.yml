name: CargoAudit

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Cargo.lock'
      - '.github/workflows/20-cargo-audit.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Cargo.lock'
      - '.github/workflows/20-cargo-audit.yml'
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit CVEs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run vulnerability audit
        run: cargo audit

      - name: Generate audit report
        continue-on-error: true
        run: cargo audit --json > audit_report.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit_report.json
          retention-days: 30

  yanked-dependencies:
    name: Check Yanked Versions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tree
        run: cargo install cargo-tree

      - name: Check for yanked crates
        run: |
          echo "=== Checking for yanked versions ==="
          cargo tree --duplicates | grep -i "yanked\|deprecated" || echo "✓ No yanked versions detected"

  advisory-db:
    name: Advisory Database Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
