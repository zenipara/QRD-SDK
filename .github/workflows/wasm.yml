name: WASM
# WASM build + browser compatibility

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    uses: ./.github/workflows/_core-wasm.yml
    with:
      commands: |
        wasm-pack build core/qrd-wasm --target web --out-dir pkg
        cd core/qrd-wasm
        npm install
        npm test
      artifact-name: wasm-package
      artifact-path: core/qrd-wasm/pkg/
      timeout: 25