name: Core SDK
# Shared reusable workflow for SDK builds and tests

on:
  workflow_call:
    inputs:
      sdk-type:
        description: 'SDK type (python, typescript, go, java)'
        type: string
        required: true
      python-version:
        description: 'Python version for Python SDK'
        type: string
        default: '3.9'
        required: false
      node-version:
        description: 'Node version for TypeScript SDK'
        type: string
        default: '18'
        required: false
      go-version:
        description: 'Go version for Go SDK'
        type: string
        default: '1.21'
        required: false
      java-version:
        description: 'Java version for Java SDK'
        type: string
        default: '11'
        required: false
      commands:
        description: 'Commands to run'
        type: string
        required: true
      artifact-name:
        description: 'Artifact name for uploads'
        type: string
        default: ''
        required: false
      artifact-path:
        description: 'Artifact path for uploads'
        type: string
        default: ''
        required: false
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 20
        required: false
    outputs:
      build-status:
        description: 'Build status'
        value: ${{ jobs.sdk.outputs.build-status }}

jobs:
  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ inputs.python-version }}
        if: inputs.sdk-type == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Setup Node.js ${{ inputs.node-version }}
        if: inputs.sdk-type == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Setup Go ${{ inputs.go-version }}
        if: inputs.sdk-type == 'go'
        uses: actions/setup-go@v4
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Java ${{ inputs.java-version }}
        if: inputs.sdk-type == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Cache Python dependencies
        if: inputs.sdk-type == 'python'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('sdk/python/requirements*.txt', 'sdk/python/pyproject.toml') }}

      - name: Cache Go modules
        if: inputs.sdk-type == 'go'
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('sdk/go/go.sum') }}

      - name: Cache Maven dependencies
        if: inputs.sdk-type == 'java'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('sdk/java/pom.xml') }}

      - name: Execute commands
        run: |
          set -euo pipefail
          cd sdk/${{ inputs.sdk-type }}
          ${{ inputs.commands }}

      - name: Upload artifacts
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## SDK Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "- SDK type: ${{ inputs.sdk-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commands executed: ${{ inputs.commands }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY