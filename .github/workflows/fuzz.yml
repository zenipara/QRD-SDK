name: Fuzz
# Parser fuzzing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Fuzz footer parser
        run: cargo fuzz run footer_parser -- -runs=10000

      - name: Fuzz schema parser
        run: cargo fuzz run schema_parser -- -runs=10000

      - name: Fuzz row group parser
        run: cargo fuzz run rowgroup_parser -- -runs=10000

      - name: Fuzz compression decoder
        run: cargo fuzz run compression_decoder -- -runs=10000

      - name: Upload fuzz artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/