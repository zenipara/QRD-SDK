name: Core Heavy
# Shared reusable workflow for heavy validation jobs

on:
  workflow_call:
    inputs:
      job-type:
        description: 'Heavy job type (fuzz, stress, benchmark, etc.)'
        type: string
        required: true
      rust-version:
        description: 'Rust toolchain version'
        type: string
        default: 'stable'
        required: false
      commands:
        description: 'Commands to run'
        type: string
        required: true
      artifact-name:
        description: 'Artifact name for uploads'
        type: string
        default: ''
        required: false
      artifact-path:
        description: 'Artifact path for uploads'
        type: string
        default: ''
        required: false
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 60
        required: false
    outputs:
      heavy-results:
        description: 'Heavy validation results'
        value: ${{ jobs.heavy.outputs.heavy-results }}

jobs:
  heavy:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      heavy-results: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust ${{ inputs.rust-version }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Configure Cargo for heavy jobs
        run: |
          echo "Configuring Cargo for heavy workloads..."
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [registries.crates-io]
          protocol = "sparse"

          [net]
          retry = 10

          [build]
          incremental = false

          [profile.release]
          lto = true
          codegen-units = 1
          panic = "abort"
          EOF

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-heavy-${{ inputs.job-type }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-heavy-${{ inputs.job-type }}-
            ${{ runner.os }}-cargo-heavy-

      - name: Install additional tools
        if: inputs.job-type == 'fuzz'
        run: cargo install cargo-fuzz

      - name: Install valgrind
        if: inputs.job-type == 'memory'
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Execute heavy commands
        run: |
          set -euo pipefail
          ${{ inputs.commands }}

      - name: Upload artifacts
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## Heavy Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Job type: ${{ inputs.job-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rust version: ${{ inputs.rust-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commands executed: ${{ inputs.commands }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY