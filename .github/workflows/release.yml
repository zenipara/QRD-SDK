name: Release
# Automated release pipeline

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_core-release.yml
    with:
      release-type: crates
      commands: |
        cargo publish --workspace
        cargo build --workspace --release
        tar -czf qrd-linux-x64.tar.gz -C target/release qrd-core
        tar -czf qrd-wasm.tar.gz -C core/qrd-wasm/pkg .
      artifact-name: qrd-linux-x64.tar.gz
      artifact-path: ./qrd-linux-x64.tar.gz
      timeout: 45
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}